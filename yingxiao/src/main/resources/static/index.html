<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>荣芳餐饮管理有限公司排队人数统计系统</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="header-content">
            <h1><i class="bi bi-people-fill"></i> 荣芳餐饮管理有限公司排队人数统计系统</h1>
            <div class="header-desc">实时监控各门店排队数据，助力运营决策</div>
        </div>
    </header>

    <main class="main-content">
        <div class="filter-card">
            <div class="card-header">
                <h3><i class="bi bi-funnel-fill"></i> 条件筛选</h3>
            </div>
            <div class="card-body">
                <div class="filter-form">
                    <div class="form-group">
                        <label for="location"><i class="bi bi-geo-alt-fill"></i> 地点</label>
                        <select id="location">
                            <option value="">全部地点</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="category"><i class="bi bi-grid-1x2-fill"></i> 品类</label>
                        <select id="category">
                            <option value="">全部品类</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="restaurantName"><i class="bi bi-shop-window"></i> 餐馆名称</label>
                        <select id="restaurantName">
                            <option value="">全部餐馆</option>
                        </select>
                    </div>
                    <div class="form-group-time-actions">
                        <div class="form-group">
                            <label for="statTime"><i class="bi bi-calendar-clock"></i> 时间点</label>
                            <input type="datetime-local" id="statTime" step="3600">
                        </div>
                        <div class="form-actions">
                            <button id="searchBtn" class="btn primary-btn"><i class="bi bi-search"></i> 查询</button>
                            <button id="resetBtn" class="btn ghost-btn"><i class="bi bi-arrow-counterclockwise"></i> 重置</button>
                            <button id="compareBtn" class="btn ghost-btn"><i class="bi bi-bar-chart-steps"></i> 对比</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="data-card">
            <div class="card-header">
                <h3><i class="bi bi-table"></i> 排队数据列表</h3>
                <div class="data-count" id="dataCount">共 <span>0</span> 条数据</div>
            </div>
            <div class="card-body">
                <div class="table-wrapper">
                    <table id="dataTable">
                        <thead>
                        <tr>
                            <th>序号</th>
                            <th>地点</th>
                            <th>品类</th>
                            <th>餐馆名称</th>
                            <th>排队人数</th>
                            <th>统计时间点</th>
                            <th>人数变化</th>
                        </tr>
                        </thead>
                        <tbody id="dataBody">
                        <tr class="empty-row">
                            <td colspan="7">
                                <div class="empty-state">
                                    <i class="bi bi-inbox"></i>
                                    <p>暂无数据，请点击查询获取</p>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 排队人数统计系统 - 数据实时更新</p>
    </footer>
</div>

<!-- 对比模态框 -->
<div id="compareModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="bi bi-calendar2-range"></i> 时间对比</h3>
            <span class="close">&times;</span>
        </div>
        <div class="modal-body">
            <!-- 筛选条件 -->
            <div class="filter-form compare-form">
                <div class="form-group">
                    <label for="compareLocation"><i class="bi bi-geo-alt-fill"></i> 地点</label>
                    <select id="compareLocation">
                        <option value="">全部地点</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="compareCategory"><i class="bi bi-grid-1x2-fill"></i> 品类</label>
                    <select id="compareCategory">
                        <option value="">全部品类</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="compareRestaurant"><i class="bi bi-shop-window"></i> 餐馆名称</label>
                    <select id="compareRestaurant">
                        <option value="">全部餐馆</option>
                    </select>
                </div>
                <!-- 时间点1：日期选择器 + 小时下拉框（无分钟） -->
                <div class="form-group time-group">
                    <label><i class="bi bi-clock"></i> 时间点1</label>
                    <div class="time-picker">
                        <input type="date" id="time1Date" class="date-input" />
                        <select id="time1Hour" class="hour-select">
                            <option value="">小时</option>
                        </select>
                    </div>
                </div>
                <!-- 时间点2：日期选择器（时分固定为时间点1的小时） -->
                <div class="form-group">
                    <label for="time2"><i class="bi bi-calendar"></i> 时间点2</label>
                    <input type="date" id="time2" disabled />
                </div>
                <!-- 按钮组单独一行，右对齐 -->
                <div class="form-actions compare-actions">
                    <button id="compareSearchBtn" class="btn primary-btn"><i class="bi bi-search"></i> 查询对比</button>
                    <button id="compareResetBtn" class="btn ghost-btn"><i class="bi bi-arrow-counterclockwise"></i> 重置</button>
                </div>
            </div>
            <!-- 对比结果表格 -->
            <div class="table-wrapper">
                <table id="compareTable">
                    <thead>
                    <tr>
                        <th>序号</th>
                        <th>地点</th>
                        <th>品类</th>
                        <th>餐馆名称</th>
                        <th>时间点1人数</th>
                        <th>时间点2人数</th>
                        <th>人数变化</th>
                    </tr>
                    </thead>
                    <tbody id="compareBody">
                    <tr class="empty-row">
                        <td colspan="7">
                            <div class="empty-state">
                                <i class="bi bi-inbox"></i>
                                <p>请选择时间点并点击查询</p>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="js/index.js"></script>
</body>
</html>
